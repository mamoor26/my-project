<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Document</title>
</head>
<body>

    <div class="container mt-5">
        <div class="row text-center">
            <h1>Register Your Account</h1>
                <hr>
            <div class="col-lg-8 offset-2 ">
                

                <div class="row">

                     <div class="col-lg-2 mt-4"></div>
                    <div class="col-lg-8 mt-4">
                     <input type="text" class="form-control" placeholder="enter your name" id="name">
                    </div>
                    <div class="col-lg-2 mt-4"></div>
                     <div class="col-lg-2 mt-4"></div>
                    <div class="col-lg-8 mt-4">
                     <input type="email" class="form-control" placeholder="enter your mail" id="mail">
                    </div>
                    <div class="col-lg-2 mt-4"></div>
                     <div class="col-lg-2 mt-4"></div>
                    <div class="col-lg-8 mt-4">
                     <input type="password" class="form-control" placeholder="enter your password" id="password">
                    </div>
                    <div class="col-lg-2 mt-4"></div>
                     <div class="col-lg-2 mt-4"></div>
                    <div class="col-lg-8 mt-4">
                     <input type="number" class="form-control" placeholder="enter your contact" id="number">
                    </div>
                    <div class="col-lg-2 mt-4"></div>
                     <div class="col-lg-2 mt-4"></div>
                    <div class="col-lg-8 mt-4">
                     <textarea  class="form-control" placeholder="enter your address" id="address"></textarea>
                    </div>
                    <div class="col-lg-2 mt-4"></div>
                </div>
                <button class="btn btn-primary mt-3" onclick="register()">Account Register</button>
            </div>
        </div>
    </div>



    <script src="/Javascript/register.js"></script>
    <script src="/assets/bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
